plugins:
  - name: jwt
    route: auth-protected
    config:
      header_names:
        - authorization
      key_claim_name: iss
      claims_to_verify:
        - exp
      realm: "Access Token"

  - name: jwt
    route: user-protected
    config:
      header_names:
        - authorization
      key_claim_name: iss
      claims_to_verify:
        - exp
      realm: "Access Token"

  - name: jwt
    route: auth-refresh
    config:
      cookie_names:
        - refresh_token
      key_claim_name: iss
      claims_to_verify:
        - exp
      realm: "Refresh Token"

