_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:8000
    routes:
      - name: auth-public
        paths:
          - /api/auth-service/login
          - /api/auth-service/register
        strip_path: false
        methods:
          - POST
        protocols:
          - http
          - https
        preserve_host: true

      - name: auth-refresh
        paths:
          - /api/auth-service/refresh
        strip_path: false
        methods:
          - POST
        protocols:
          - http
          - https
        preserve_host: true

      - name: auth-protected
        paths:
          - /api/auth-service/logout
        strip_path: false
        protocols:
          - http
          - https
        preserve_host: true
        plugins:
          - name: jwt-to-header
            config:
              strip_claims: "false"
              token_required: "true"

  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-protected
        paths:
          - /api/user-service
        strip_path: false
        protocols:
          - http
          - https
        plugins:
          - name: jwt-to-header
            config:
              strip_claims: "false"
              token_required: "true"

consumers:
